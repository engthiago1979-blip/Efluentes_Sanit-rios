  FLUORETO_TOTAL:          {rotulo: "Fluoreto Total",           tipo: maximo, maximo: 10.0, unidade: "mg/L", categoria: condicional_tabela1, citacao: "Art. 16, II - Tabela I"}
  MANGANES_DISSOLVIDO:     {rotulo: "Manganês Dissolvido",      tipo: maximo, maximo: 1.0,  unidade: "mg/L", categoria: condicional_tabela1, citacao: "Art. 16, II - Tabela I"}
  MERCURIO_TOTAL:          {rotulo: "Mercúrio Total",           tipo: maximo, maximo: 0.01, unidade: "mg/L", categoria: condicional_tabela1, citacao: "Art. 16, II - Tabela I"}
  NIQUEL_TOTAL:            {rotulo: "Níquel Total",             tipo: maximo, maximo: 2.0,  unidade: "mg/L", categoria: condicional_tabela1, citacao: "Art. 16, II - Tabela I"}
  PRATA_TOTAL:             {rotulo: "Prata Total",              tipo: maximo, maximo: 0.1,  unidade: "mg/L", categoria: condicional_tabela1, citacao: "Art. 16, II - Tabela I"}
  SELENIO_TOTAL:           {rotulo: "Selênio Total",            tipo: maximo, maximo: 0.30, unidade: "mg/L", categoria: condicional_tabela1, citacao: "Art. 16, II - Tabela I"}
  SULFETO_TOTAL:           {rotulo: "Sulfeto",                  tipo: maximo, maximo: 1.0,  unidade: "mg/L", categoria: condicional_tabela1, citacao: "Art. 16, II - Tabela I"}
